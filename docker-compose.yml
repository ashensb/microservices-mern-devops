version: '3.8'

services:
  # 🍃 MongoDB for Product Service
  product-db:
    image: mongo:latest
    container_name: product-db
    ports:
      - "27017:27017"
    volumes:
      - product_db_data:/data/db
    networks:
      - microservices-network

  # 🍃 MongoDB for Order Service
  order-db:
    image: mongo:latest
    container_name: order-db
    ports:
      - "27018:27017" # Host එකේ 27018 පාවිච්චි කරන්නේ product-db එකත් එක්ක පැටලෙන්නේ නැති වෙන්න
    volumes:
      - order_db_data:/data/db
    networks:
      - microservices-network

  # 📦 Product Microservice Backend
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://product-db:27017/product_db
      - PORT=5001
    depends_on:
      - product-db
    networks:
      - microservices-network

  # 📜 Order Microservice Backend
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5002:5002"
    environment:
      - MONGO_URI=mongodb://order-db:27017/order_db
      - PORT=5002
    depends_on:
      - order-db
    networks:
      - microservices-network

  # 💻 React Frontend
  frontend:
    build: ./frontend
    container_name: mern-frontend
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
    networks:
      - microservices-network

volumes:
  product_db_data:
  order_db_data:

networks:
  microservices-network:
    driver: bridge